name: Deploy Production

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.12.0"
  FIREBASE_PROJECT_ID: "sama-mahmoudi-portfolio-060126"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - name: Check Firebase secrets
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT == '' }}
        run: |
          echo "Missing required secret: FIREBASE_SERVICE_ACCOUNT"
          echo "Create it in GitHub -> Settings -> Secrets and variables -> Actions"
          exit 1
      - uses: FirebaseExtended/action-hosting-deploy@v0
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ env.FIREBASE_PROJECT_ID }}
          channelId: live
